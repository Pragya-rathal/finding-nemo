model:
  name: LHLFNetPP
  image_size: 640
  in_channels: 3
  encoder:
    embed_dims: [64, 128, 256, 512]
    depths: [2, 2, 4, 2]
    num_heads: [1, 2, 4, 8]
    sr_ratios: [8, 4, 2, 1]
    mlp_ratios: [4.0, 4.0, 4.0, 4.0]
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate: 0.1
  fusion:
    out_channels: 256
  fpn:
    out_channels: 256
  attention:
    kernel_size: 3
  detector:
    num_classes: 300
    strides: [8, 16, 32, 64]
    reg_max: 16
    score_threshold: 0.05
    nms_threshold: 0.6
    topk: 300
  embedding:
    dim: 512
    dropout: 0.1
  taxonomy:
    order_classes: 40
    family_classes: 100
    genus_classes: 200
    species_classes: 400
    trait_classes: 32
