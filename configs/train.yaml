train:
  epochs: 100
  batch_size: 8
  accumulation_steps: 1
  grad_clip: 1.0
  amp: true
  ema:
    enabled: true
    decay: 0.9998
  optimizer:
    name: adamw
    lr: 0.0002
    weight_decay: 0.05
    betas: [0.9, 0.999]
  scheduler:
    name: cosine
    warmup_epochs: 5
    min_lr: 1.0e-6
  early_stopping:
    patience: 15
    monitor: val/loss
  loss:
    lambda_order: 0.5
    lambda_family: 0.75
    lambda_genus: 1.0
    lambda_species: 1.25
    lambda_trait: 0.5
    cb_beta: 0.9999
    focal_gamma: 2.0
